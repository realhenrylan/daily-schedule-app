name: Dispatch Course Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call dispatch endpoint
        env:
          DISPATCH_URL: ${{ secrets.DISPATCH_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$DISPATCH_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing DISPATCH_URL or CRON_SECRET secret"
            exit 1
          fi

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" -X POST "$DISPATCH_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --data '{}')

          echo "HTTP_CODE=$HTTP_CODE"
          echo "Response body:"
          cat response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Dispatch failed"
            exit 1
          fi
